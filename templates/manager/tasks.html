<!DOCTYPE html>
<html>

<head>

<title>Tasks</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2>Task List</h2>

<a
href="{{ url_for('task.add_task') }}"
class="btn btn-primary mb-3">

Assign Task

</a>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Employee</th>

<th>Title</th>

<th>Platform</th>

<th>Complexity</th>

<th>Status</th>

<th>Due Date</th>

</tr>

</thead>

<tbody>

{% for task in tasks %}

<tr>

<td>{{ task.task_id }}</td>

<td>{{ task.employee.full_name }}</td>

<td>{{ task.title }}</td>

<td>{{ task.platform }}</td>

<td>{{ task.complexity }}</td>

<td>{{ task.status }}</td>

<td>{{ task.due_date }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
