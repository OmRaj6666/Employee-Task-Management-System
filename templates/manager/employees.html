<!DOCTYPE html>
<html lang="en">

<head>

<title>Employees</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Employees</h2>

<a href="{{ url_for('employee.add_employee') }}" class="btn btn-primary mb-3">

Add Employee

</a>

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Role</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for emp in employees %}

<tr>

<td>{{ emp.employee_id }}</td>

<td>{{ emp.full_name }}</td>

<td>{{ emp.email }}</td>

<td>{{ emp.phone }}</td>

<td>{{ emp.role }}</td>

<td>

<a
href="{{ url_for('employee.edit_employee', id=emp.employee_id) }}"
class="btn btn-warning btn-sm">

Edit

</a>

<a
href="{{ url_for('employee.delete_employee', id=emp.employee_id) }}"
class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
