{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block page_title %}Change Password{% endblock %}

{% block content %}

<div class="content-card">

<form method="POST">

<div class="mb-3">

<label>Old Password</label>

<input
type="password"
name="old_password"
class="form-control"
required>

</div>

<div class="mb-3">

<label>New Password</label>

<input
type="password"
name="new_password"
class="form-control"
required>

</div>

<button class="btn btn-success">

Change Password

</button>

</form>

</div>

{% endblock %}
