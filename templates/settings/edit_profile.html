{% extends "base.html" %}

{% block title %}Edit Profile{% endblock %}

{% block page_title %}Edit Profile{% endblock %}

{% block content %}

<div class="content-card">

<form method="POST">

<div class="mb-3">

<label>Full Name</label>

<input
type="text"
name="full_name"
class="form-control"
value="{{ current_user.full_name }}"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
value="{{ current_user.email }}"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
name="phone"
class="form-control"
value="{{ current_user.phone }}">

</div>

<button class="btn btn-primary">

Save Changes

</button>

</form>

</div>

{% endblock %}
